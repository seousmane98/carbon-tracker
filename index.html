<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Tracker Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.3s ease-in-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .result-value {
            font-size: 2em;
            color: #333;
            font-weight: bold;
        }
        
        .result-unit {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 10px;
            color: #c62828;
            display: none;
            margin-top: 20px;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="emoji">🌍</div>
            <h1>Carbon Tracker</h1>
            <p>Calcule ton empreinte carbone</p>
        </div>
        
        <div class="form-group">
            <label for="activity">Activité :</label>
            <select id="activity">
                <option value="car">🚗 Voiture (km)</option>
                <option value="bus">🚌 Bus (km)</option>
                <option value="train">🚂 Train (km)</option>
                <option value="flight">✈️ Avion (km)</option>
                <option value="electricity">⚡ Électricité (kWh)</option>
                <option value="meat">🥩 Viande (kg)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="value">Valeur :</label>
            <input type="number" id="value" placeholder="Exemple: 100" min="0" step="0.1">
        </div>
        
        <button onclick="calculateCarbon()">Calculer 🔥</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>
        
        <div class="result" id="result">
            <div class="result-title">Empreinte Carbone :</div>
            <div class="result-value" id="resultValue">0 kg CO2</div>
            <div class="result-unit" id="resultDetails"></div>
        </div>
        
        <div class="error" id="error"></div>
    </div>
    
    <script>
        function calculateCarbon() {
            const activity = document.getElementById('activity').value;
            const value = document.getElementById('value').value;
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            
            // Validation
            if (!value || value <= 0) {
                errorDiv.textContent = 'Veuillez entrer une valeur positive';
                errorDiv.classList.add('show');
                resultDiv.classList.remove('show');
                return;
            }
            
            // Affiche le loading
            loadingDiv.classList.add('show');
            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');
            
            // Appelle l'API
            fetch(`http://localhost:8000/api/carbon?activity=${activity}&value=${value}`)
                .then(response => {
                    if (!response.ok) throw new Error('Erreur API');
                    return response.json();
                })
                .then(data => {
                    loadingDiv.classList.remove('show');
                    
                    if (data.error) {
                        errorDiv.textContent = data.error;
                        errorDiv.classList.add('show');
                    } else {
                        document.getElementById('resultValue').textContent = `${data.carbon_kg} kg CO2`;
                        document.getElementById('resultDetails').textContent = `${data.activity} - ${data.value} unités`;
                        resultDiv.classList.add('show');
                    }
                })
                .catch(error => {
                    loadingDiv.classList.remove('show');
                    errorDiv.textContent = 'Erreur de connexion à l\'API. Assure-toi que le serveur est lancé!';
                    errorDiv.classList.add('show');
                });
        }
        
        // Permet d'appuyer sur Entrée pour calculer
        document.getElementById('value').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateCarbon();
        });
    </script>
</body>
</html>
