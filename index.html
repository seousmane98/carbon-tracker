<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .result {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.3s ease-in-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .result-value {
            font-size: 2em;
            color: #333;
            font-weight: bold;
        }
        
        .result-unit {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 10px;
            color: #c62828;
            display: none;
            margin-top: 20px;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats-section {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .chart-section {
            margin-top: 40px;
            background: #f9f9f9;
            padding: 30px;
            border-radius: 15px;
            display: none;
        }
        
        .chart-section.show {
            display: block;
        }
        
        .chart-title {
            color: #333;
            font-weight: 600;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e0e0e0;
            padding-top: 30px;
        }
        
        .history-title {
            color: #333;
            font-weight: 600;
            font-size: 1.3em;
            margin-bottom: 20px;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .history-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            font-size: 0.95em;
            color: #555;
        }
        
        .history-item strong {
            color: #667eea;
        }
        
        .history-empty {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        
        .clear-btn {
            margin-top: 15px;
            background: #f0f0f0;
            color: #666;
            font-size: 0.9em;
            padding: 10px;
        }
        
        .clear-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="emoji">🌍</div>
            <h1>Carbon Tracker</h1>
            <p>Calcule ton empreinte carbone (Données sauvegardées dans le cloud ☁️)</p>
        </div>
        
        <div class="form-group">
            <label for="activity">Activité :</label>
            <select id="activity">
                <option value="car">🚗 Voiture (km)</option>
                <option value="bus">🚌 Bus (km)</option>
                <option value="train">🚂 Train (km)</option>
                <option value="flight">✈️ Avion (km)</option>
                <option value="electricity">⚡ Électricité (kWh)</option>
                <option value="meat">🥩 Viande (kg)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="value">Valeur :</label>
            <input type="number" id="value" placeholder="Exemple: 100" min="0" step="0.1">
        </div>
        
        <button onclick="calculateCarbon()">Calculer 🔥</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>
        
        <div class="result" id="result">
            <div class="result-title">Empreinte Carbone :</div>
            <div class="result-value" id="resultValue">0 kg CO2</div>
            <div class="result-unit" id="resultDetails"></div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="stats-section" id="statsSection" style="display: none;">
            <div class="stat-card">
                <h3>Total CO2</h3>
                <div class="value" id="totalCO2">0 kg</div>
            </div>
            <div class="stat-card">
                <h3>Nombre de calculs</h3>
                <div class="value" id="totalCalcs">0</div>
            </div>
        </div>
        
        <div class="chart-section" id="chartSection">
            <div class="chart-title">📊 Émissions par activité</div>
            <div class="chart-container">
                <canvas id="emissionsChart"></canvas>
            </div>
        </div>
        
        <div class="history-section">
            <div class="history-title">📋 Historique Cloud</div>
            <div class="history-list" id="historyList">
                <div class="history-empty">Chargement depuis le cloud...</div>
            </div>
            <button class="clear-btn" onclick="clearHistory()">Effacer l'historique</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAT4IsI4MY9Ds2E92YVBh4FyaNI1bveCgU",
            authDomain: "carbon-tracker-7c1b4.firebaseapp.com",
            projectId: "carbon-tracker-7c1b4",
            storageBucket: "carbon-tracker-7c1b4.firebasestorage.app",
            messagingSenderId: "1016656840710",
            appId: "1:1016656840710:web:e7daa2ce01a0d36476db87",
            measurementId: "G-R7M845HV6X"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let chart = null;
        const userId = 'anonymous-user';
        
        // Charger au démarrage
        loadHistory();
        updateStats();
        
        window.calculateCarbon = function() {
            const activity = document.getElementById('activity').value;
            const value = document.getElementById('value').value;
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            
            if (!value || value <= 0) {
                errorDiv.textContent = 'Veuillez entrer une valeur positive';
                errorDiv.classList.add('show');
                resultDiv.classList.remove('show');
                return;
            }
            
            loadingDiv.classList.add('show');
            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');
            
            fetch(`https://carbon-tracker-production-9ff2.up.railway.app/api/carbon?activity=${activity}&value=${value}`)
                .then(response => response.json())
                .then(data => {
                    loadingDiv.classList.remove('show');
                    
                    if (data.error) {
                        errorDiv.textContent = data.error;
                        errorDiv.classList.add('show');
                    } else {
                        document.getElementById('resultValue').textContent = `${data.carbon_kg} kg CO2`;
                        document.getElementById('resultDetails').textContent = `${data.activity} - ${data.value} unités`;
                        resultDiv.classList.add('show');
                        addToHistory(data);
                    }
                })
                .catch(error => {
                    loadingDiv.classList.remove('show');
                    errorDiv.textContent = 'Erreur de connexion à l\'API';
                    errorDiv.classList.add('show');
                });
        };
        
        async function addToHistory(data) {
            try {
                await addDoc(collection(db, 'users', userId, 'history'), {
                    activity: data.activity,
                    value: data.value,
                    carbon_kg: data.carbon_kg,
                    timestamp: new Date()
                });
                loadHistory();
            } catch (e) {
                console.error('Erreur Firestore:', e);
            }
        }
        
        function loadHistory() {
            const historyList = document.getElementById('historyList');
            const q = query(collection(db, 'users', userId, 'history'), orderBy('timestamp', 'desc'), limit(10));
            
            onSnapshot(q, (snapshot) => {
                const history = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    history.push({
                        activity: data.activity,
                        value: data.value,
                        carbon_kg: data.carbon_kg,
                        timestamp: data.timestamp.toDate().toLocaleTimeString('fr-FR'),
                        id: doc.id
                    });
                });
                
                if (history.length === 0) {
                    historyList.innerHTML = '<div class="history-empty">Aucun calcul encore</div>';
                    return;
                }
                
                historyList.innerHTML = history.map(item => `
                    <div class="history-item">
                        <strong>${getEmoji(item.activity)} ${item.activity}</strong> - 
                        ${item.value} unités = <strong>${item.carbon_kg} kg CO2</strong>
                        <br><small>🕐 ${item.timestamp}</small>
                    </div>
                `).join('');
                
                updateStats();
            });
        }
        
        async function updateStats() {
            const snapshot = await getDocs(collection(db, 'users', userId, 'history'));
            const history = [];
            snapshot.forEach(doc => {
                history.push(doc.data());
            });
            
            const totalCO2 = history.reduce((sum, item) => sum + item.carbon_kg, 0);
            document.getElementById('totalCO2').textContent = totalCO2.toFixed(2) + ' kg';
            document.getElementById('totalCalcs').textContent = history.length;
            
            if (history.length > 0) {
                document.getElementById('statsSection').style.display = 'grid';
                updateChart(history);
            }
        }
        
        function updateChart(history) {
            const chartSection = document.getElementById('chartSection');
            chartSection.classList.add('show');
            
            const aggregated = {};
            history.forEach(item => {
                if (!aggregated[item.activity]) {
                    aggregated[item.activity] = 0;
                }
                aggregated[item.activity] += item.carbon_kg;
            });
            
            const labels = Object.keys(aggregated).map(a => getEmoji(a) + ' ' + a);
            const data = Object.values(aggregated);
            
            const ctx = document.getElementById('emissionsChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'CO2 (kg)',
                        data: data,
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe', '#43e97b'],
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { callback: function(value) { return value + ' kg'; } }
                        }
                    }
                }
            });
        }
        
        function getEmoji(activity) {
            const emojis = {'car': '🚗', 'bus': '🚌', 'train': '🚂', 'flight': '✈️', 'electricity': '⚡', 'meat': '🥩'};
            return emojis[activity] || '📊';
        }
        
        window.clearHistory = async function() {
            if (confirm('Effacer l\'historique cloud ?')) {
                const snapshot = await getDocs(collection(db, 'users', userId, 'history'));
                snapshot.forEach(async doc => {
                    await deleteDoc(doc.ref);
                });
                loadHistory();
            }
        };
        
        document.getElementById('value').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateCarbon();
        });
    </script>
</body>
</html>
